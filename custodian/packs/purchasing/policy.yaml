# Kernel BAND policy for the purchasing pack.
# UNLIKE refunds, purchasing HAS an autonomous path: a small invoice from an
# approved vendor that matches its purchase order can be paid by the agent with
# no human, because the kernel band (L1) permits it. Anything over the cap
# routes to L3 and a human signature -- same kernel, same band enum, different
# band policy, different business risk profile. This is the reuse story in one
# file: no engine, verifier, or kernel code changes between packs.
version: "1.0"
default_band: L1

bands:
  L1:
    max_spend: 100.00
    requires_approval: false
    approval_backend: none
    description: "Routine payables: pay autonomously up to $100 when fully clean"
  L3:
    max_spend: null
    requires_approval: true
    approval_backend: twilio_verify
    description: "Larger payables: always require human approval"

rules:
  - match:
      skill: invoice.pay
      spend_estimate_gt: 100.0
    assign_band: L3
    order: 0

escalation:
  timeout_seconds: 600
  on_timeout: deny
  retry_count: 0
