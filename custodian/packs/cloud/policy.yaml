# Kernel BAND policy for the cloud provisioning pack.
# Small, routine jobs on approved instances provision autonomously (L1).
# Anything over the cost cap routes to L3 and a human signature --
# same kernel, same band enum, different business risk profile.
version: "1.0"
default_band: L1

bands:
  L1:
    max_spend: 5.00
    requires_approval: false
    approval_backend: none
    description: "Routine compute: provision autonomously up to $5/hr when fully clean"
  L3:
    max_spend: null
    requires_approval: true
    approval_backend: twilio_verify
    description: "Larger compute jobs: always require human approval"

rules:
  - match:
      skill: compute.provision
      spend_estimate_gt: 5.0
    assign_band: L3
    order: 0

escalation:
  timeout_seconds: 600
  on_timeout: deny
  retry_count: 0
